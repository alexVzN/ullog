name: Build & test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: C++${{ matrix.cxx_std }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        cxx_std: [17, 20, 23]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja -DULLOG_BUILD_TESTS=ON -DCMAKE_CXX_STANDARD=${{ matrix.cxx_std }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --output-junit report.xml

      - name: Upload JUnit report
        if: always() && matrix.cxx_std == 17
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gtest-report
          path: build/report.xml

  arm-build:
    name: arm-none-eabi · ${{ matrix.cpu }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        cpu: [cortex-m0plus, cortex-m4, cortex-m7, cortex-m33]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install ARM toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja
             -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake
             -DARM_CPU=${{ matrix.cpu }}

      - name: Build
        run: cmake --build build --parallel

  format-check:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install clang-format 19
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-19
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-19 100

      - name: Run clang-format check
        run: ./bin/check-clang-format.sh

  report:
    name: Publish test report
    needs: test
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: gtest-report
          path: .

      - name: Publish test report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: GTest Results
          path: report.xml
          reporter: java-junit